// ─── CHAT ─────────────────────────────────────────────
function Chat({initMsg="",location}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Hej! 👋 I'm your Stockholm local guide — ask me anything in any language!\n\nFood, transport, hidden gems, what to do... I'm honest about what I know and what I don't. What do you need?"}]);
  const [input,setInput]=useState(initMsg);
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);
  const taRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);

  const send=async(txt)=>{
    const text=txt||input.trim();
    if(!text||loading)return;
    setInput("");
    const locStr=location?`User location: ${location}`:"Near Slussen, Södermalm";
    const newMsgs=[...msgs,{role:"user",content:text}];
    setMsgs(newMsgs);
    setLoading(true);
    try{
      const res=await fetch("/.netlify/functions/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({messages:newMsgs.map(m=>({role:m.role,content:m.content})),location:locStr})
      });
      const data=await res.json();
      if(data.error){
        setMsgs(p=>[...p,{role:"assistant",content:`⚠️ ${data.error.message||"Something went wrong. Please try again."}`}]);
      } else {
        setMsgs(p=>[...p,{role:"assistant",content:data.content?.[0]?.text||"Sorry, try again!"}]);
      }
    }catch{
      setMsgs(p=>[...p,{role:"assistant",content:"Connection issue — check your internet and try again! 🔄"}]);
    }
    setLoading(false);
  };

  const mic=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Voice input works in Chrome browser!");return;}
    const r=new SR();
    r.onresult=e=>setInput(e.results[0][0].transcript);
    r.start();
  };

  return <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 112px)"}}>
    <div style={{flex:1,overflowY:"auto",padding:"16px 14px 8px"}}>
      {msgs.map((m,i)=><div key={i} className="fade-up" style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:14,gap:10}}>
        {m.role==="assistant"&&<div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#0D1B2A,#1A3A5C)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0,marginTop:2,boxShadow:"0 2px 10px rgba(13,27,42,0.25)"}}>🇸🇪</div>}
        <div style={{maxWidth:"76%",background:m.role==="user"?"linear-gradient(135deg,#0D1B2A,#1A3A5C)":"#fff",color:m.role==="user"?"#fff":"#0D1B2A",padding:"13px 16px",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",fontSize:14.5,lineHeight:1.65,boxShadow:"0 2px 16px rgba(0,0,0,0.08)",whiteSpace:"pre-wrap",fontWeight:m.role==="user"?500:400}}>{m.content}</div>
      </div>)}
      {loading&&<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#0D1B2A,#1A3A5C)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:"0 2px 10px rgba(13,27,42,0.25)"}}>🇸🇪</div>
        <div style={{background:"#fff",padding:"14px 20px",borderRadius:"18px 18px 18px 4px",boxShadow:"0 2px 16px rgba(0,0,0,0.08)"}}><Dots/></div>
      </div>}
      <div ref={bottomRef}/>
    </div>

    {/* Quick replies */}
    <div style={{padding:"8px 14px 0",display:"flex",gap:8,overflowX:"auto"}}>
      {["What's open now?","Dinner tonight?","Night bus routes?","Free museums?"].map(q=>
        <button key={q} onClick={()=>send(q)} className="pill" style={{background:"#fff",border:"1.5px solid #EAE4D8",padding:"7px 14px",fontSize:12,color:"#0D1B2A",whiteSpace:"nowrap",flexShrink:0,boxShadow:"0 1px 8px rgba(0,0,0,0.05)"}}>{q}</button>
      )}
    </div>

    {/* Input */}
    <div style={{padding:"10px 14px 18px",display:"flex",gap:10,alignItems:"flex-end"}}>
      <button onClick={mic} style={{width:46,height:46,borderRadius:"50%",flexShrink:0,background:"#fff",border:"1.5px solid #EAE4D8",fontSize:19,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>🎤</button>
      <div style={{flex:1,position:"relative"}}>
        <textarea ref={taRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Ask anything... in any language 🌍" rows={1} style={{width:"100%",borderRadius:24,border:"1.5px solid #EAE4D8",padding:"13px 50px 13px 18px",fontSize:14,fontFamily:"'DM Sans',sans-serif",resize:"none",lineHeight:1.4,boxSizing:"border-box",background:"#fff",boxShadow:"0 2px 14px rgba(0,0,0,0.07)",color:"#0D1B2A"}}/>
        <button onClick={()=>send()} style={{position:"absolute",right:7,bottom:7,width:36,height:36,borderRadius:"50%",background:input.trim()?"linear-gradient(135deg,#0D1B2A,#1A3A5C)":"#E8E0D0",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,transition:"background 0.2s"}}>➤</button>
      </div>
    </div>
  </div>;
}

function Itinerary({onNav}){
  const [hours,setHours]=useState("Full day (8hr)");
  const [vibe,setVibe]=useState([]);
  const hoursOpts=["2 hours","Half day (4hr)","Full day (8hr)","Weekend"];
  const vibeOpts=["🏛️ Culture","🍽️ Food & Cafés","🌿 Nature","🎉 Nightlife","🛍️ Shopping","💸 Budget","👨‍👩‍👧 Family"];
  const toggle=v=>setVibe(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]);
  const build=()=>{
    const v=vibe.length?vibe.join(", "):"mix of everything";
    return `Build me a detailed ${hours} Stockholm itinerary. Interests: ${v}. Starting from Slussen/Södermalm. Give specific place names, realistic times, honest transport tips, and one real local secret. Format clearly with time slots.`;
  };
  return <div style={{padding:"20px 16px 100px"}}>
    <div className="serif" style={{fontSize:26,fontWeight:900,color:"#0D1B2A",marginBottom:4}}>Build My Day</div>
    <div style={{fontSize:14,color:"#8A9BB0",marginBottom:24,fontWeight:500}}>Get a custom Stockholm plan made just for you</div>
    <div className="card" style={{borderRadius:20,padding:20,marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:700,color:"#0D1B2A",marginBottom:12}}>How much time do you have?</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {hoursOpts.map(h=><button key={h} onClick={()=>setHours(h)} className="pill" style={{background:hours===h?"#0D1B2A":"#F7F4EF",color:hours===h?"#fff":"#0D1B2A",padding:"9px 16px",fontSize:13}}>{h}</button>)}
      </div>
    </div>
    <div className="card" style={{borderRadius:20,padding:20,marginBottom:20}}>
      <div style={{fontSize:13,fontWeight:700,color:"#0D1B2A",marginBottom:12}}>What are you into? (pick any)</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {vibeOpts.map(v=><button key={v} onClick={()=>toggle(v)} className="pill" style={{background:vibe.includes(v)?"#C9A84C":"#F7F4EF",color:"#0D1B2A",padding:"9px 14px",fontSize:13}}>{v}</button>)}
      </div>
    </div>
    <button onClick={()=>onNav("chat",build())} className="gold-btn" style={{width:"100%",borderRadius:16,padding:18,fontSize:16,fontWeight:800}}>
      ✨ Build my perfect day →
    </button>
  </div>;
}

// ─── DAYTIME ──────────────────────────────────────────
function Daytime({onNav}){
  const passes=[
    {name:"Stockholm Pass (GoCity)",desc:"60+ attractions included — Vasa Museum, ABBA Museum, boat tours, hop-on bus. Huge savings if you visit multiple sites.",price:"From ~650 SEK/day",url:"https://affiliate.klook.com/sl/1holRyn",emoji:"🏆",color:"#E74C3C"},
    {name:"Arlanda Express",desc:"Fastest way from airport to city — 20 minutes, no stress, no stops.",price:"~310 SEK one way",url:"https://www.arlandaexpress.com/",emoji:"🚄",color:"#005B99"},
    {name:"Book Breakfast & Lunch",desc:"Reserve a table at Stockholm's best spots — instant confirmation, free cancellation.",price:"Varies",url:"https://www.thefork.com/restaurants/stockholm-c415144",emoji:"🥐",color:"#F39C12"},
    {name:"Bike the City",desc:"City bikes available across Stockholm April–October. Perfect for Djurgården loop.",price:"165 SEK / 3 days",url:"https://citybikes.se/",emoji:"🚲",color:"#27AE60"},
    {name:"Museum Day Pass",desc:"Plan your museum day — Vasa, Moderna, Fotografiska, Historiska all in Djurgården.",price:"Varies per museum",url:"https://gyg.me/xqrK5hiJ",emoji:"🏛️",color:"#8E44AD"},
  ];
  return <div style={{padding:"20px 16px 100px"}}>
    <div className="serif" style={{fontSize:26,fontWeight:900,color:"#0D1B2A",marginBottom:4}}>Daytime in Stockholm</div>
    <div style={{fontSize:14,color:"#8A9BB0",marginBottom:24,fontWeight:500}}>Make the most of your day — best passes & bookings</div>
    {passes.map((p,i)=><a key={i} href={p.url} target="_blank" rel="noreferrer" className="link-card" style={{display:"flex",alignItems:"center",gap:14,background:"#fff",borderRadius:18,padding:"18px 20px",marginBottom:12,textDecoration:"none",boxShadow:"0 2px 16px rgba(0,0,0,0.08)",borderLeft:`4px solid ${p.color}`}}>
      <div style={{width:48,height:48,borderRadius:14,background:p.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{p.emoji}</div>
      <div style={{flex:1}}>
        <div style={{fontSize:14,fontWeight:700,color:"#0D1B2A",marginBottom:3}}>{p.name}</div>
        <div style={{fontSize:12,color:"#8A9BB0",marginBottom:4,lineHeight:1.4}}>{p.desc}</div>
        <div style={{fontSize:12,fontWeight:700,color:p.color}}>{p.price}</div>
      </div>
      <span style={{color:"#C9A84C",fontSize:18,fontWeight:700}}>→</span>
    </a>)}
    <button onClick={()=>onNav("chat","Build me a perfect daytime itinerary in Stockholm starting from Slussen. Include museum recommendations, a lunch spot, and one hidden gem.")} className="gold-btn" style={{width:"100%",borderRadius:16,padding:17,fontSize:14,fontWeight:800,marginTop:8}}>
      🗓️ Build my perfect day with AI →
    </button>
  </div>;
}

// ─── NIGHTLIFE ─────────────────────────────────────────
function Nightlife({onNav}){
  const options=[
    {name:"VIP Pub Crawl Stockholm",desc:"Meet other travellers, skip queues, visit 4-5 bars in one night. One of Stockholm's most popular social experiences.",price:"From ~350 SEK",url:"https://gyg.me/xqrK5hiJ",emoji:"🍻",color:"#8E44AD"},
    {name:"Reserve Fine Dining",desc:"Stockholm has world-class restaurants. Book in advance — the best spots fill up fast especially on weekends.",price:"Varies",url:"https://www.thefork.com/restaurants/stockholm-c415144",emoji:"🍷",color:"#C0392B"},
    {name:"Fotografiska Museum",desc:"Stunning photography museum open until 11pm. Has a great bar and restaurant — perfect evening out.",price:"~195 SEK entry",url:"https://www.fotografiska.com/sto/en/",emoji:"📷",color:"#2C3E50"},
    {name:"Nightlife Tours",desc:"Guided nightlife experiences — local guide takes you to the best spots, no planning needed.",price:"From ~400 SEK",url:"https://gyg.me/xqrK5hiJ",emoji:"🎉",color:"#E74C3C"},
    {name:"Gondolen Bar",desc:"Suspended over Stockholm — go for a drink, stay for the view. No reservation needed for bar seating.",price:"Bar prices from ~120 SEK",url:"https://www.gondolen.se/",emoji:"🌃",color:"#C9A84C"},
  ];
  return <div style={{padding:"20px 16px 100px"}}>
    <div className="serif" style={{fontSize:26,fontWeight:900,color:"#0D1B2A",marginBottom:4}}>Stockholm Nightlife</div>
    <div style={{fontSize:14,color:"#8A9BB0",marginBottom:24,fontWeight:500}}>The best of Stockholm after dark</div>
    {options.map((p,i)=><a key={i} href={p.url} target="_blank" rel="noreferrer" className="link-card" style={{display:"flex",alignItems:"center",gap:14,background:"#fff",borderRadius:18,padding:"18px 20px",marginBottom:12,textDecoration:"none",boxShadow:"0 2px 16px rgba(0,0,0,0.08)",borderLeft:`4px solid ${p.color}`}}>
      <div style={{width:48,height:48,borderRadius:14,background:p.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{p.emoji}</div>
      <div style={{flex:1}}>
        <div style={{fontSize:14,fontWeight:700,color:"#0D1B2A",marginBottom:3}}>{p.name}</div>
        <div style={{fontSize:12,color:"#8A9BB0",marginBottom:4,lineHeight:1.4}}>{p.desc}</div>
        <div style={{fontSize:12,fontWeight:700,color:p.color}}>{p.price}</div>
      </div>
      <span style={{color:"#C9A84C",fontSize:18,fontWeight:700}}>→</span>
    </a>)}
    <button onClick={()=>onNav("chat","What are the best nightlife options in Stockholm tonight? I want a mix of bars, clubs and unique experiences near Södermalm.")} className="navy-btn" style={{width:"100%",borderRadius:16,padding:17,fontSize:14,fontWeight:800,marginTop:8}}>
      🌙 Ask AI for tonight's best spots →
    </button>
  </div>;
}

// ─── TOURS ────────────────────────────────────────────
function Tours(){
  const tags=["All","Popular","Culture","Food","Nature","Nightlife","Active","Unique","Luxury","Transport","Eco","Dining"];
  const [tag,setTag]=useState("All");
  const filtered=tag==="All"?GYG_TOURS:GYG_TOURS.filter(t=>t.tag===tag);
  const tagColors={Popular:"#E74C3C",Culture:"#8E44AD",Food:"#F39C12",Nature:"#27AE60",
    Nightlife:"#2C3E50",Active:"#3498DB",Unique:"#E67E22",Luxury:"#C9A84C",
    Transport:"#005B99",Eco:"#1ABC9C",Dining:"#C0392B",All:"#0D1B2A"};
  return <div style={{padding:"20px 16px 100px"}}>
    <div className="serif" style={{fontSize:26,fontWeight:900,color:"#0D1B2A",marginBottom:4}}>Book Tours & Experiences 🎟️</div>
    <div style={{fontSize:14,color:"#8A9BB0",marginBottom:16,fontWeight:500}}>Handpicked Stockholm experiences — skip the queue, instant confirmation</div>
    <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:20,paddingBottom:4}}>
      {tags.map(t=><button key={t} onClick={()=>setTag(t)} className="pill" style={{background:tag===t?tagColors[t]||"#0D1B2A":"#fff",color:tag===t?"#fff":"#0D1B2A",border:`1.5px solid ${tag===t?tagColors[t]||"#0D1B2A":"#EAE4D8"}`,padding:"8px 16px",fontSize:12,whiteSpace:"nowrap",flexShrink:0}}>{t}</button>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      {filtered.map((t,i)=><a key={i} href={t.url} target="_blank" rel="noreferrer" style={{background:"#fff",borderRadius:16,padding:"16px 14px",textDecoration:"none",boxShadow:"0 2px 14px rgba(0,0,0,0.07)",display:"flex",flexDirection:"column",gap:8,transition:"transform 0.15s",borderTop:`3px solid ${tagColors[t.tag]||"#C9A84C"}`}}
        onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"}
        onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}>
        <span style={{fontSize:26}}>{t.emoji}</span>
        <div style={{fontSize:12.5,fontWeight:700,color:"#0D1B2A",lineHeight:1.3}}>{t.name}</div>
        <div style={{fontSize:10,background:tagColors[t.tag]||"#C9A84C",color:"#fff",borderRadius:50,padding:"2px 8px",fontWeight:700,alignSelf:"flex-start"}}>{t.tag}</div>
      </a>)}
    </div>
    <a href="https://gyg.me/xqrK5hiJ" target="_blank" rel="noreferrer" className="gold-btn" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,borderRadius:16,padding:17,fontSize:14,fontWeight:800,textDecoration:"none"}}>
      🎯 See All Stockholm Experiences →
    </a>
  </div>;
}

// ─── APP ──────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("home");
  const [chatInit,setChatInit]=useState("");
  const [large,setLarge]=useState(false);
  const [location,setLocation]=useState("");

  useEffect(()=>{
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(pos=>{
        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`)
          .then(r=>r.json())
          .then(d=>{const a=d.address;setLocation((a.neighbourhood||a.suburb||a.city_district||a.city||"Stockholm")+", Stockholm");})
          .catch(()=>{});
      },()=>{});
    }
  },[]);

  const nav=(s,msg="")=>{
    if(msg){setChatInit(msg);setScreen("chat");}
    else{setScreen(s);if(s!=="chat")setChatInit("");}
    window.scrollTo(0,0);
  };

  const navItems=[
    {id:"home",emoji:"🏠",label:"Home"},
    {id:"chat",emoji:"💬",label:"Ask AI"},
    {id:"tours",emoji:"🎟️",label:"Tours"},
    {id:"links",emoji:"🔗",label:"Links"},
    {id:"emergency",emoji:"🆘",label:"Help"},
  ];

  const titles={
    chat:"Ask Local AI 💬",transport:"Getting Around 🚇",food:"Food & Drinks 🍕",
    todo:"Things To Do 📍",gems:"Hidden Gems 💎",emergency:"Emergency Help 🆘",
    itinerary:"Build My Day 🗓️",links:"Useful Links 🔗",videos:"Video Guides ▶️",
    daytime:"Daytime Stockholm ☀️",nightlife:"Stockholm Nightlife 🌙",tours:"Book Experiences 🎟️"
  };

  return <div style={{fontFamily:"'DM Sans',sans-serif",background:"#F7F4EF",minHeight:"100vh",fontSize:large?"110%":"100%"}}>

    {/* Header for inner screens */}
    {screen!=="home"&&<div style={{background:"#fff",padding:"14px 18px",display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid #EAE4D8",position:"sticky",top:0,zIndex:10,boxShadow:"0 2px 16px rgba(0,0,0,0.07)"}}>
      <button onClick={()=>setScreen("home")} style={{width:38,height:38,borderRadius:"50%",background:"#F7F4EF",border:"none",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>←</button>
      <div className="serif" style={{fontSize:17,fontWeight:900,color:"#0D1B2A",flex:1}}>{titles[screen]}</div>
      <button onClick={()=>setLarge(p=>!p)} style={{background:large?"#C9A84C":"#F7F4EF",border:"none",borderRadius:50,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer",color:"#0D1B2A"}}>{large?"A-":"A+"}</button>
    </div>}

    {/* Screens */}
    {screen==="home"&&<Home onNav={nav} location={location}/>}
    {screen==="chat"&&<Chat key={chatInit} initMsg={chatInit} location={location}/>}
    {screen==="transport"&&<Transport/>}
    {screen==="food"&&<Food onNav={nav}/>}
    {screen==="todo"&&<ToDo onNav={nav}/>}
    {screen==="gems"&&<Gems/>}
    {screen==="emergency"&&<Emergency/>}
    {screen==="itinerary"&&<Itinerary onNav={nav}/>}
    {screen==="links"&&<LinksScreen/>}
    {screen==="videos"&&<VideosScreen/>}
    {screen==="tours"&&<Tours/>}
    {screen==="daytime"&&<Daytime onNav={nav}/>}
    {screen==="nightlife"&&<Nightlife onNav={nav}/>}

    {/* Bottom Nav */}
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#fff",borderTop:"1px solid #EAE4D8",display:"flex",padding:"8px 0 14px",boxShadow:"0 -4px 24px rgba(0,0,0,0.09)",zIndex:100}}>
      {navItems.map(item=><button key={item.id} onClick={()=>nav(item.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"5px 4px"}}>
        <span style={{fontSize:21,filter:screen===item.id?"none":"grayscale(0.5) opacity(0.55)",transition:"filter 0.15s"}}>{item.emoji}</span>
        <span style={{fontSize:10,fontWeight:700,color:screen===item.id?"#0D1B2A":"#8A9BB0",letterSpacing:0.3,fontFamily:"'DM Sans',sans-serif"}}>{item.label}</span>
        {screen===item.id&&<div style={{width:18,height:3,background:"#C9A84C",borderRadius:2}}/>}
      </button>)}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
